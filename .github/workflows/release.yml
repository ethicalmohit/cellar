name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v0.3.0)'
        required: true
        type: string
      notes:
        description: 'Release notes (optional — GitHub auto-generates from commits if blank)'
        required: false
        type: string

jobs:
  release:
    name: Tag & Release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must match vX.Y.Z (got: ${{ inputs.version }})"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check version tag does not already exist
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/${{ inputs.version }}$"; then
            echo "::error::Tag ${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build & vet
        run: |
          go vet ./...
          go build ./...

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - name: Build release binaries
        run: |
          VERSION="${{ inputs.version }}"
          LDFLAGS="-X main.version=${VERSION}"
          GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o cellar-macos-arm64 .
          GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o cellar-macos-amd64 .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          body: ${{ inputs.notes }}
          generate_release_notes: ${{ inputs.notes == '' }}
          files: |
            cellar-macos-arm64
            cellar-macos-amd64
